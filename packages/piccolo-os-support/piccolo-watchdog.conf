# Piccolo OS: ensure the most reliable hardware watchdog claims /dev/watchdog0.
#
# intel_oc_wdt (Intel overclock watchdog) can race iTCO_wdt and grab watchdog0.
# The overclock watchdog is tied to turbo/overclocking features and may not fire
# during deep C-states or certain types of hard lockups.  iTCO_wdt (PCH-based)
# is designed for server/embedded reliability and is the correct choice.
#
# softdog is a pure-software watchdog that cannot recover from kernel hangs.
# It should never be used on an appliance that has a hardware watchdog.
#
# These blacklists are no-ops on platforms where the modules don't exist
# (ARM, AMD), so this file is safe to ship unconditionally.
#
# Note: blacklisting only applies to modules, not built-in drivers.
# Both drivers are modules in kernel-default.

blacklist intel_oc_wdt
blacklist softdog
