[Manager]
# Hardware watchdog: systemd pings /dev/watchdog0 (if present) every ~15s.
# If the kernel or PID 1 hangs and 30s pass without a ping, the SoC hardware
# forces a full reset — the only mechanism that can recover from a hard freeze.
# On platforms without a hardware watchdog the setting is silently ignored.
RuntimeWatchdogSec=30

# During shutdown/reboot, if the sequence stalls for 10 minutes the hardware
# watchdog forces a reset to prevent the device hanging mid-reboot.
RebootWatchdogSec=10min
KExecWatchdogSec=10min
