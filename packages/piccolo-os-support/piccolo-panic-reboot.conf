# Piccolo OS: auto-reboot on kernel panic
#
# A headless appliance with no console access cannot display a panic trace,
# so halting is strictly worse than rebooting.

# Reboot 10 seconds after a kernel panic.
kernel.panic = 10

# Promote kernel oopses to panics.  An oops often leaves the system in a
# degraded state; on a headless appliance a clean reboot is preferable.
kernel.panic_on_oops = 1
